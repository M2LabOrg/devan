<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEVAN Agent — Polar Bear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      image-rendering: pixelated;
    }

    /* Arctic night sky */
    body {
      background: linear-gradient(180deg,
        #060C1A 0%,
        #0A1228 15%,
        #0E1A3A 30%,
        #12224C 45%,
        #162A5E 58%,
        #1C3870 70%,
        #224880 80%,
        #2A6090 90%,
        #3A8098 100%
      );
    }

    .scene {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 40px;
    }

    .mascot-wrap {
      margin-bottom: 32px;
      filter: drop-shadow(0 6px 28px rgba(95,240,208,0.15)) drop-shadow(0 4px 16px rgba(0,0,0,0.5));
      animation: entrance 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    .bear {
      animation: breathe 4s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .wordmark {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #C8F0FF;
      text-shadow: 0 2px 14px rgba(95,240,208,0.4);
      margin-bottom: 8px;
      animation: entrance 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .status {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(160,230,255,0.45);
      margin-bottom: 36px;
      animation: entrance 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .dots {
      display: flex; gap: 10px;
      animation: entrance 0.9s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    .dot {
      width: 4px; height: 4px; border-radius: 0;
      background: rgba(95,240,208,0.6);
      animation: dotpulse 1.6s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes entrance {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes dotpulse {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }
    @keyframes aurora {
      0%   { opacity: 0.10; transform: scaleX(1)    translateX(-30px); }
      50%  { opacity: 0.22; transform: scaleX(1.05) translateX(30px); }
      100% { opacity: 0.10; transform: scaleX(1)    translateX(-30px); }
    }
    @keyframes aurora2 {
      0%   { opacity: 0.07; transform: scaleX(1)    translateX(20px); }
      50%  { opacity: 0.18; transform: scaleX(1.04) translateX(-20px); }
      100% { opacity: 0.07; transform: scaleX(1)    translateX(20px); }
    }
  </style>
</head>
<body>

  <!-- ══ Stars — arctic sky, dense ══ -->
  <svg style="position:fixed;inset:0;pointer-events:none;z-index:0" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <circle cx="70"   cy="40"  r="1.5" fill="#E0F8FF" opacity="0.75"/>
    <circle cx="200"  cy="90"  r="0.8" fill="#E0F8FF" opacity="0.45"/>
    <circle cx="330"  cy="30"  r="1.2" fill="#E0F8FF" opacity="0.6"/>
    <circle cx="490"  cy="70"  r="1"   fill="#E0F8FF" opacity="0.5"/>
    <circle cx="640"  cy="45"  r="1.8" fill="#E0F8FF" opacity="0.65"/>
    <circle cx="780"  cy="110" r="0.7" fill="#E0F8FF" opacity="0.35"/>
    <circle cx="920"  cy="35"  r="1.3" fill="#E0F8FF" opacity="0.55"/>
    <circle cx="1060" cy="75"  r="1"   fill="#E0F8FF" opacity="0.45"/>
    <circle cx="1200" cy="50"  r="1.5" fill="#E0F8FF" opacity="0.6"/>
    <circle cx="1380" cy="95"  r="0.9" fill="#E0F8FF" opacity="0.4"/>
    <circle cx="150"  cy="175" r="0.8" fill="#E0F8FF" opacity="0.3"/>
    <circle cx="520"  cy="155" r="1"   fill="#E0F8FF" opacity="0.3"/>
    <circle cx="850"  cy="185" r="0.8" fill="#E0F8FF" opacity="0.25"/>
    <circle cx="1290" cy="165" r="1.1" fill="#E0F8FF" opacity="0.35"/>
    <circle cx="420"  cy="260" r="0.7" fill="#E0F8FF" opacity="0.2"/>
    <circle cx="1000" cy="240" r="0.9" fill="#E0F8FF" opacity="0.2"/>
    <!-- Full moon — icy cold -->
    <circle cx="1180" cy="120" r="34" fill="#E0F8FF" opacity="0.12"/>
    <circle cx="1180" cy="120" r="24" fill="#E0F8FF" opacity="0.09"/>
    <!-- Moon crater hints -->
    <circle cx="1172" cy="112" r="5"  fill="#C8E8F8" opacity="0.06"/>
    <circle cx="1190" cy="128" r="4"  fill="#C8E8F8" opacity="0.05"/>
  </svg>

  <!-- ══ Aurora borealis — rippling bands ══ -->
  <svg style="position:fixed;inset:0;pointer-events:none;z-index:1" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <!-- Primary green-cyan curtain -->
    <ellipse cx="600" cy="200" rx="600" ry="70"
             fill="#40E0A0" opacity="0.12"
             style="animation: aurora 6s ease-in-out infinite; transform-origin: center;"/>
    <ellipse cx="600" cy="240" rx="500" ry="50"
             fill="#5FF0D0" opacity="0.09"
             style="animation: aurora 7s 0.5s ease-in-out infinite; transform-origin: center;"/>
    <!-- Secondary magenta hint — like real aurora -->
    <ellipse cx="900" cy="280" rx="400" ry="45"
             fill="#B060FF" opacity="0.06"
             style="animation: aurora2 8s 1s ease-in-out infinite; transform-origin: center;"/>
    <ellipse cx="400" cy="310" rx="380" ry="38"
             fill="#40E0A0" opacity="0.07"
             style="animation: aurora2 5.5s 2s ease-in-out infinite; transform-origin: center;"/>
  </svg>

  <!-- ══ Arctic ice scene ══ -->
  <svg style="position:fixed;bottom:0;left:0;right:0;height:55%;pointer-events:none;z-index:1"
       viewBox="0 0 1440 500" preserveAspectRatio="xMidYMax meet">

    <!-- Frozen sea / flat ice -->
    <rect x="0" y="380" width="1440" height="120" fill="#0E1A3A"/>

    <!-- Ice surface line — slight shimmer -->
    <rect x="0" y="378" width="1440" height="4" fill="#2A608A" opacity="0.6"/>

    <!-- Far ice floes -->
    <rect x="50"   y="368" width="180" height="14" fill="#1C3050" rx="4"/>
    <rect x="350"  y="372" width="120" height="10" fill="#1C3050" rx="3"/>
    <rect x="700"  y="365" width="200" height="16" fill="#1C3050" rx="5"/>
    <rect x="1050" y="370" width="160" height="12" fill="#1C3050" rx="4"/>
    <rect x="1300" y="367" width="140" height="14" fill="#1C3050" rx="4"/>

    <!-- Ice chunks / bergs — left side -->
    <polygon points="100,380  60,330  80,325  140,328  160,380"  fill="#162844"/>
    <polygon points="100,380  60,330  80,325  140,328  160,380"  fill="#1E4060" opacity="0.6"/>
    <!-- Ice glint left -->
    <rect x="72"  y="328" width="20" height="4" fill="#A0D8F0" opacity="0.25"/>

    <!-- Ice berg center-left -->
    <polygon points="380,380  340,310  360,300  420,305  450,380"  fill="#162844"/>
    <rect x="352" y="303" width="30" height="5" fill="#A0D8F0" opacity="0.3"/>

    <!-- Ice berg right -->
    <polygon points="1100,380 1060,318 1080,308 1140,312 1170,380"  fill="#162844"/>
    <rect x="1068" y="310" width="28" height="5" fill="#A0D8F0" opacity="0.25"/>

    <!-- Near ice shelf — main ground -->
    <path d="M0,390 Q120,360 240,382 Q380,395 500,375 Q620,360 720,380 Q840,395 960,372 Q1080,355 1200,378 Q1320,392 1440,368 L1440,500 L0,500Z"
          fill="#0E2040"/>
    <!-- Ice surface highlight -->
    <path d="M0,390 Q120,360 240,382 Q380,395 500,375 Q620,360 720,380 Q840,395 960,372 Q1080,355 1200,378 Q1320,392 1440,368"
          stroke="#4A90B8" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Snow on ice surface — pixel dots -->
    <rect x="160"  y="400" width="4" height="4" fill="#C8E8F8" opacity="0.4"/>
    <rect x="400"  y="408" width="4" height="4" fill="#C8E8F8" opacity="0.3"/>
    <rect x="680"  y="398" width="6" height="4" fill="#C8E8F8" opacity="0.35"/>
    <rect x="920"  y="404" width="4" height="4" fill="#C8E8F8" opacity="0.3"/>
    <rect x="1200" y="400" width="4" height="4" fill="#C8E8F8" opacity="0.4"/>
  </svg>

  <div class="scene">
    <!--
      MINECRAFT-INSPIRED POLAR BEAR
      P=12px per unit, canvas 192×204.
      Palette: #E8F4FC white body, #B8D4E8 ice shadow,
               #D0ECFC muzzle, #1C2840 dark navy,
               #0A1228 black depths, #5FF0D0 lens glow.
    -->
    <div class="mascot-wrap">
      <svg class="bear" viewBox="0 0 192 204" width="192" height="204"
           fill="none" xmlns="http://www.w3.org/2000/svg"
           shape-rendering="crispEdges">

        <!-- ── EAR BUMPS ── -->
        <!-- Left ear -->
        <rect x="12"  y="0"  width="36" height="36" fill="#D0E8F8"/>
        <!-- Left ear inner -->
        <rect x="18"  y="6"  width="24" height="24" fill="#A8C8E0"/>
        <!-- Right ear -->
        <rect x="144" y="0"  width="36" height="36" fill="#D0E8F8"/>
        <!-- Right ear inner -->
        <rect x="150" y="6"  width="24" height="24" fill="#A8C8E0"/>

        <!-- ── WIDE BLOCKY HEAD ── -->
        <rect x="12"  y="24" width="168" height="84" fill="#E8F4FC"/>
        <!-- Head top edge — icy shadow -->
        <rect x="12"  y="24" width="168" height="12" fill="#B8D4E8"/>
        <!-- Head side shadows -->
        <rect x="12"  y="24" width="12"  height="84" fill="#B8D4E8"/>
        <rect x="168" y="24" width="12"  height="84" fill="#B8D4E8"/>

        <!-- ── FACE PLATE ── -->
        <rect x="36"  y="36" width="120" height="60" fill="#EEF8FF"/>

        <!-- ── COOL SUNGLASSES — neon-edged ── -->
        <!-- Frame band -->
        <rect x="30"  y="42" width="132" height="30" fill="#0A1228"/>
        <!-- Left lens — deep purple tint, arctic chic -->
        <rect x="33"  y="45" width="54"  height="24" fill="#180828"/>
        <!-- Right lens -->
        <rect x="105" y="45" width="54"  height="24" fill="#180828"/>
        <!-- Bridge -->
        <rect x="87"  y="42" width="18"  height="30" fill="#0A1228"/>
        <!-- Neon cyan lens edges (top + bottom) -->
        <rect x="30"  y="42" width="132" height="3"  fill="#5FF0D0" opacity="0.8"/>
        <rect x="30"  y="69" width="132" height="3"  fill="#5FF0D0" opacity="0.8"/>
        <!-- Aurora reflection in lenses -->
        <rect x="36"  y="48" width="18"  height="4"  fill="#40E0A0" opacity="0.4"/>
        <rect x="108" y="48" width="18"  height="4"  fill="#40E0A0" opacity="0.4"/>
        <!-- Lens inner shine -->
        <rect x="36"  y="54" width="8"   height="3"  fill="#5FF0D0" opacity="0.25"/>
        <rect x="108" y="54" width="8"   height="3"  fill="#5FF0D0" opacity="0.25"/>

        <!-- ── SNOUT BLOCK ── -->
        <rect x="48"  y="72" width="96"  height="36" fill="#D0ECFC"/>
        <!-- Nose — dark cold -->
        <rect x="72"  y="72" width="48"  height="18" fill="#1C2840"/>
        <!-- Nose top highlight -->
        <rect x="75"  y="75" width="14"  height="6"  fill="#2A4060"/>
        <!-- Mouth -->
        <rect x="84"  y="90" width="6"   height="12" fill="#8AB0C8"/>
        <rect x="72"  y="96" width="48"  height="6"  fill="#8AB0C8"/>

        <!-- ── BODY BLOCK ── -->
        <rect x="24"  y="108" width="144" height="72" fill="#E8F4FC"/>
        <!-- Body top shading -->
        <rect x="24"  y="108" width="144" height="12" fill="#B8D4E8"/>
        <!-- Body side shadows -->
        <rect x="24"  y="108" width="12"  height="72" fill="#B8D4E8"/>
        <rect x="156" y="108" width="12"  height="72" fill="#B8D4E8"/>
        <!-- Belly lighter center -->
        <rect x="60"  y="120" width="72"  height="48" fill="#F4FCFF" opacity="0.6"/>

        <!-- ── ARMS ── -->
        <!-- Left arm -->
        <rect x="0"   y="108" width="30"  height="60" fill="#D8EEF8"/>
        <rect x="0"   y="108" width="12"  height="60" fill="#B8D4E8"/>
        <!-- Left paw -->
        <rect x="0"   y="156" width="36"  height="18" fill="#C0E0F0"/>
        <!-- Claw marks -->
        <rect x="4"   y="171" width="4"   height="6"  fill="#8AB0C8" opacity="0.6"/>
        <rect x="12"  y="171" width="4"   height="6"  fill="#8AB0C8" opacity="0.6"/>
        <rect x="20"  y="171" width="4"   height="6"  fill="#8AB0C8" opacity="0.6"/>
        <!-- Right arm -->
        <rect x="162" y="108" width="30"  height="60" fill="#D8EEF8"/>
        <rect x="180" y="108" width="12"  height="60" fill="#B8D4E8"/>
        <!-- Right paw -->
        <rect x="156" y="156" width="36"  height="18" fill="#C0E0F0"/>
        <rect x="160" y="171" width="4"   height="6"  fill="#8AB0C8" opacity="0.6"/>
        <rect x="168" y="171" width="4"   height="6"  fill="#8AB0C8" opacity="0.6"/>
        <rect x="176" y="171" width="4"   height="6"  fill="#8AB0C8" opacity="0.6"/>

        <!-- ── LEGS ── -->
        <!-- Left leg -->
        <rect x="36"  y="180" width="48"  height="24" fill="#D8EEF8"/>
        <rect x="36"  y="180" width="12"  height="24" fill="#B8D4E8"/>
        <!-- Left foot — slightly blue-tinted (ice) -->
        <rect x="30"  y="192" width="54"  height="12" fill="#B8D4E8"/>
        <!-- Right leg -->
        <rect x="108" y="180" width="48"  height="24" fill="#D8EEF8"/>
        <rect x="144" y="180" width="12"  height="24" fill="#B8D4E8"/>
        <!-- Right foot -->
        <rect x="108" y="192" width="54"  height="12" fill="#B8D4E8"/>

        <!-- ── LITTLE SCARF — techy red accent ── -->
        <rect x="36"  y="105" width="120" height="10" fill="#C0392B"/>
        <rect x="36"  y="108" width="120" height="4"  fill="#A93226"/>
        <!-- Scarf end hanging right -->
        <rect x="144" y="108" width="16"  height="28" fill="#C0392B"/>
        <rect x="144" y="128" width="16"  height="6"  fill="#A93226"/>

      </svg>
    </div>

    <div class="wordmark">DEVAN Agent</div>
    <div class="status">Initialising . . .</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</body>
</html>
