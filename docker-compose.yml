services:

  # ── Main application ────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "${PORT:-5001}:5001"
    environment:
      - PORT=5001
      # Point to native Ollama on the Mac host — uses Apple GPU (Metal) automatically.
      # Start it with: ollama serve   (in a separate terminal before make start)
      - OLLAMA_HOST=http://host.docker.internal:11434
      # Persist the RAG index across container restarts
      - INDEXER_DB=/app/client/kb_data/indexer.db
      # Optional: set your GitHub Copilot PAT here (or in .env)
      # - github_copilot_token=your_token_here
    volumes:
      # Persist user projects, logs, and KB index outside the container
      - ./client/projects:/app/client/projects
      - ./client/logs:/app/client/logs
      - ./client/kb_data:/app/client/kb_data
      # Mount host home directory read-only so users can index any local folder.
      # Inside the container, host paths appear under /host/home/.
      # Example: ~/Documents/reports → /host/home/Documents/reports
      - ~/:/host/home:ro
      # Mount external volumes (LaCie and other /Volumes drives)
      - /Volumes:/host/volumes:ro
    restart: unless-stopped
